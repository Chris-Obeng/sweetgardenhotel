kind = "web"
previewPath = "/"
title = "Sweet Garden Hotel"
version = "1.0.0"
id = "artifacts/sweet-garden-hotel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23857

[services.development]
run = "pnpm --filter @workspace/sweet-garden-hotel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sweet-garden-hotel", "run", "build" ]
publicDir = "artifacts/sweet-garden-hotel/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23857"
BASE_PATH = "/"
